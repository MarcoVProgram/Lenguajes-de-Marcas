<!DOCTYPE html>
<html lang="es">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Actividad guiada - Funciones en JavaScript</title>
        <link rel="stylesheet" href="styles.css">
    </head>
    <body>
        <main class="contenedor">
            <section class="panel">
                <header class="cabecera">
                    <h1>Lista de alumnos</h1>
                    <p>Actividad guiada para practicar funciones en JavaScript</p>
                </header>
            
                <section class="zona-formulario">
                    <div class="grupo-input">
                        <label for="alumno">Nuevo alumno</label>
                        <input type="text" id="alumno" placeholder="Escribe una alumno...">
                    </div>
                    
                    <div class="botones">
                        <button id="btnAgregar">Añadir alumno</button>
                        <button id="btnVaciar" class="secundario">Vaciar lista</button>
                    </div>
                </section>
                
                <section class="zona-info">
                
                    <div class="tarjeta-info">
                        <span class="etiqueta">Total</span>
                        <span id="totalAlumnos" class="valor">0</span>
                    </div>
                
                    <div class="tarjeta-info">
                        <span class="etiqueta">Asiste</span>
                        <span id="alumnosCompletadas" class="valor">0</span>
                    </div>
                
                    <div class="tarjeta-info">
                        <span class="etiqueta">No Asiste</span>
                        <span id="alumnosPendientes" class="valor">0</span>
                    </div>
                </section>
                
                <section class="zona-lista">
                    <h2>Alumnos pendientes</h2>
                    <ul id="listaAlumnos" class="lista-alumnos">
                    <!-- Los alumnos se añadirán con JavaScript -->
                    </ul>
                </section>
            </section>
        </main>
        
        <script src="script.js"></script>
    </body>
</html>

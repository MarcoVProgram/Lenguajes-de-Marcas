<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Plantilla de Examen</title>
  <link rel="stylesheet" href="styler.css" />
</head>
<body id="body">
 
  <h1>Plantilla de Examen</h1>
 
  <!-- DOMContentLoaded -->
  <section>
    <h2 id="titulo">Ejercicios 1 al 7</h2>
  </section>
 
  <section>
    <h3>1. Registro de Notas</h3>
    <button id="btnPedirNotas">Pedir Notas</button>
      <p id="datosNotas"></p>
  </section>
 
  <section>
    <h3>2. Inventario de Productos</h3>
    <button id="btnProd">Pedir Productos</button>
    <div id="cajaProd"></div>
  </section>

  <section>
    <h3>3. Cajero Automatico Simple</h3>
    <p id = "saldo">Saldo: 1000€</p>
    <button id="btnIni">Iniciar (Deshabilitado)</button>
  </section>
  
  <section>
    <h3>4. Estadistica de Numeros</h3>
    <button id="btnStats">Pedir Estadistica</button>
      <p id="datosStats"></p>
  </section>
 
 
  <section>
    <h3>5. Analisis de Frase</h3>
    <button id="btnFrase">Pedir Frase</button>
      <p id="datosFrase"></p>
  </section>

  <section>
    <h3>6. Registro de Alumnos</h3>
    <button id="btnAlu">Guardar Alumnos</button>
      <p id="datosAlu"></p>
  </section>

  <section>
    <h3>7. Generador de Numeros Aleatorios</h3>
    <button id="btnAle">Guardar Alumnos</button>
      <p id="datosAle"></p>
  </section>
 
  <!-- JS -->
  <script src="script.js"></script>
 
</body>
</html>
